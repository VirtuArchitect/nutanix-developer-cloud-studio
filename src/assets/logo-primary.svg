<svg viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .frame { fill: none; stroke: #1B2A4A; stroke-width: 6; }
      .node { fill: #00B8D9; }
      .node-alt { fill: #1B2A4A; }
      .word-main { font-family: 'Segoe UI', Inter, Arial, sans-serif; font-weight: 700; fill: #1B2A4A; }
      .word-sub { font-family: 'Segoe UI', Inter, Arial, sans-serif; font-weight: 500; fill: #4C5A73; letter-spacing: 3px; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="900" height="220"/>

  <g transform="translate(20,20)">
    <rect class="frame" x="6" y="6" width="168" height="168" rx="28"/>
    <polygon class="node" points="90,60 112,73 112,99 90,112 68,99 68,73"/>
    <polygon class="node-alt" points="45,30 60,39 60,57 45,66 30,57 30,39"/>
    <polygon class="node-alt" points="135,30 150,39 150,57 135,66 120,57 120,39"/>
    <polygon class="node-alt" points="45,110 60,119 60,137 45,146 30,137 30,119"/>
    <polygon class="node-alt" points="135,110 150,119 150,137 135,146 120,137 120,119"/>
    <g stroke="#00B8D9" stroke-width="3" opacity="0.55">
      <line x1="90" y1="86" x2="45" y2="48"/>
      <line x1="90" y1="86" x2="135" y2="48"/>
      <line x1="90" y1="86" x2="45" y2="128"/>
      <line x1="90" y1="86" x2="135" y2="128"/>
    </g>
  </g>

  <text x="230" y="105" class="word-main" font-size="46">Nutanix Developer</text>
  <text x="230" y="150" class="word-main" font-size="46">Cloud Studio</text>
  <text x="230" y="180" class="word-sub" font-size="15">MVP PROTOTYPE - NOT NUTANIX AFFILIATED</text>
</svg>
