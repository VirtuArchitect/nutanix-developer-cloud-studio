services:
  ndc-studio:
    build:
      context: .
    image: nutanix-developer-cloud-studio:local
    ports:
      - "${NDC_STUDIO_HOST_PORT:-18080}:8080"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 8080
      NDC_STATIC_DIR: /app/dist
      NDC_DATA_FILE: /data/ndc-studio.json
      NDC_REPOSITORY: json
      NDC_AUDIT_RETENTION_EVENTS: 500
      NDC_AUDIT_EXPORT_DESTINATION_REF: ""
      NDC_RATE_LIMIT_PER_MINUTE: 120
      NDC_PRISM_REAL_ADAPTER: disabled
      OIDC_ISSUER_URL: ""
      OIDC_CLIENT_ID: ""
      NDC_DEFAULT_ROLE: "Platform Admin"
      NDC_REQUIRE_TRUSTED_IDENTITY: "false"
      NUTANIX_CREDENTIAL_PROFILE: "lab-readonly"
    volumes:
      - ndc-studio-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  ndc-studio-data:
