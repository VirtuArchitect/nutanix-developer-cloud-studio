services:
  ndc-studio:
    build:
      context: .
    image: nutanix-developer-cloud-studio:lab
    env_file:
      - ${NDC_STUDIO_ENV_FILE:-.env.lab}
    ports:
      - "${NDC_STUDIO_HOST_PORT:-18080}:8080"
    volumes:
      - ndc-studio-lab-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  ndc-studio-lab-data:
