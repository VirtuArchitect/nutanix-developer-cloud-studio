services:
  ndc-studio:
    build:
      context: .
    image: nutanix-developer-cloud-studio:mock-prism
    env_file:
      - ${NDC_STUDIO_ENV_FILE:-.env.mock-prism}
    depends_on:
      mock-prism:
        condition: service_healthy
    ports:
      - "${NDC_STUDIO_HOST_PORT:-18080}:8080"
    volumes:
      - ndc-studio-mock-prism-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  mock-prism:
    build:
      context: .
    image: nutanix-developer-cloud-studio:mock-prism
    command: ["npm", "run", "mock-prism:start"]
    env_file:
      - ${NDC_STUDIO_ENV_FILE:-.env.mock-prism}
    ports:
      - "${NDC_MOCK_PRISM_HOST_PORT:-19440}:9440"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9440/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  ndc-studio-mock-prism-data:
